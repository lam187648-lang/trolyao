<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trò Chơi Theo Dõi Đầu</title>
  <link rel="stylesheet" href="head-tracking-game.css">
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
  <!-- Start Screen -->
  <div id="start-screen" class="screen active">
    <div class="container">
      <h1>🎮 Game Theo Dõi Đầu</h1>
      <p>Trả lời câu hỏi bằng cách di chuyển đầu</p>
      <div class="instructions">
        <div class="instruction-item">⬅️ Nhìn TRÁI = Sai</div>
        <div class="instruction-item">➡️ Nhìn PHẢI = Đúng</div>
      </div>
      <button id="start-btn" class="btn">Bắt Đầu</button>
    </div>
  </div>

  <!-- Loading Screen -->
  <div id="loading-screen" class="screen">
    <div class="container">
      <h2>Đang tải...</h2>
      <div class="loader"></div>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    
    <div class="game-ui">
      <div class="top-bar">
        <div class="score">🏆 <span id="score">0</span></div>
        <div class="question-count">📝 <span id="current-question">1</span>/<span id="total-questions">10</span></div>
      </div>
      
      <div class="question-panel">
        <div class="question-text" id="question-text">Đang tải...</div>
        <div class="answers">
          <div class="answer left" id="answer-left">
            <span class="arrow">⬅️</span>
            <span id="answer-left-text">Sai</span>
          </div>
          <div class="answer right" id="answer-right">
            <span id="answer-right-text">Đúng</span>
            <span class="arrow">➡️</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen" class="screen">
    <div class="container">
      <h1>🎉 Kết Quả</h1>
      <div class="result-score" id="final-score">0</div>
      <div class="result-details">
        <div>Đúng: <span id="correct-count">0</span>/<span id="total-count">10</span></div>
        <div>Tỷ lệ: <span id="percentage">0%</span></div>
      </div>
      <button id="restart-btn" class="btn">Chơi Lại</button>
      <button id="home-btn" class="btn secondary">Thoát</button>
    </div>
  </div>

  <script src="head-tracking-game.js"></script>
</body>
</html>
